<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>atua-computer — browser engine test</title>
  <style>
    body { font-family: monospace; background: #1a1a2e; color: #e6e6e6; padding: 20px; }
    #output { white-space: pre-wrap; background: #16213e; padding: 15px; border-radius: 5px; min-height: 200px; }
    .info { color: #a8d8ea; }
    .success { color: #4ecca3; }
    .error { color: #e84545; }
    h1 { color: #e8e8e8; }
  </style>
</head>
<body>
  <h1>atua-computer engine test</h1>
  <div id="output"></div>

  <script type="module">
    const output = document.getElementById('output');
    function log(msg, cls = '') {
      const span = document.createElement('span');
      span.className = cls;
      span.textContent = msg + '\n';
      output.appendChild(span);
    }

    try {
      log('Loading @wasmer/sdk...', 'info');
      const { init, runWasix, Directory } = await import('https://cdn.jsdelivr.net/npm/@wasmer/sdk@0.10.0/dist/index.mjs');

      log('Initializing SDK...', 'info');
      await init();
      log('SDK initialized', 'success');

      // Fetch engine binary
      log('Fetching engine.wasm...', 'info');
      const engineResp = await fetch('/engine-wasix.wasm');
      if (!engineResp.ok) throw new Error('Failed to fetch engine.wasm: ' + engineResp.status);
      const engineBytes = new Uint8Array(await engineResp.arrayBuffer());
      log(`Engine loaded: ${engineBytes.length} bytes`, 'success');

      // Fetch hello.elf test binary
      log('Fetching hello.elf...', 'info');
      const elfResp = await fetch('/hello.elf');
      if (!elfResp.ok) throw new Error('Failed to fetch hello.elf: ' + elfResp.status);
      const elfBytes = new Uint8Array(await elfResp.arrayBuffer());
      log(`ELF loaded: ${elfBytes.length} bytes`, 'success');

      // Create virtual filesystem with hello.elf
      const testDir = new Directory();
      await testDir.writeFile('hello.elf', elfBytes);
      log('Filesystem created with hello.elf', 'info');

      // Run the Blink engine with hello.elf
      log('Running engine...', 'info');
      const instance = await runWasix(engineBytes, {
        args: ['engine', '/test/hello.elf'],
        env: {},
        mount: { '/test': testDir },
      });

      log('Waiting for output...', 'info');
      const result = await instance.wait();

      log('--- OUTPUT ---', 'info');
      if (result.stdout) log(result.stdout, 'success');
      if (result.stderr) log(result.stderr, 'error');
      log(`Exit code: ${result.code}`, result.code === 0 ? 'success' : 'error');

    } catch (err) {
      log('ERROR: ' + err.message, 'error');
      if (err.stack) log(err.stack, 'error');
    }
  </script>
</body>
</html>
