<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>atua-computer — apt install test</title>
  <style>
    body { font-family: monospace; background: #1a1a2e; color: #e6e6e6; padding: 20px; }
    #output { white-space: pre-wrap; background: #16213e; padding: 15px; border-radius: 5px;
              min-height: 200px; max-height: 600px; overflow-y: auto; font-size: 12px; }
  </style>
</head>
<body>
  <h1>atua-computer — apt install integration test</h1>
  <div id="output"></div>

  <script type="module">
    import { AtuaComputer } from './atua-computer.js';

    const output = document.getElementById('output');
    function log(msg) {
      output.textContent += msg;
      output.scrollTop = output.scrollHeight;
    }

    // Same URL parsing as e7-network.html (which works)
    const params = new URLSearchParams(location.search);
    const relayUrl = params.get('relay');
    const dnsProxy = params.get('dns');

    const script = [
      'echo "[STEP 1 PASS] resolv.conf written"',
      'apt update 2>&1 | tail -5',
      'if [ $? -eq 0 ]; then echo "[STEP 2 PASS] apt update"; else echo "[FAIL] apt update failed"; exit 1; fi',
      'apt install -y curl 2>&1 | tail -5',
      'if [ $? -eq 0 ]; then echo "[STEP 3 PASS] apt install curl"; else echo "[FAIL] apt install curl failed"; exit 1; fi',
      'curl -s http://example.com 2>&1 | head -5',
      'if [ $? -eq 0 ]; then echo "[STEP 4 PASS] curl example.com"; else echo "[FAIL] curl failed"; exit 1; fi',
      'echo "[ALL PASS]"',
    ].join('; ');

    try {
      const computer = new AtuaComputer();
      log('Booting engine with networking...\n');
      log('Relay: ' + (relayUrl || 'none') + '\n');

      await computer.boot({
        engineUrl: '/engine.wasm',
        rootfsUrl: '/debian-mini.tar',
        args: ['engine', '/bin/bash', '--norc', '--noprofile', '-c', script],
        env: { HOME: '/', TERM: 'dumb', DEBIAN_FRONTEND: 'noninteractive' },
        files: {
          '/etc/resolv.conf': new TextEncoder().encode('nameserver 8.8.8.8\n'),
          '/etc/apt/sources.list': new TextEncoder().encode(
            'deb http://deb.debian.org/debian trixie main\n'
          ),
        },
        // Networking disabled for now — focus on bash/apt plumbing first
        // wispRelayUrl: relayUrl || undefined,
        // dnsProxyUrl: dnsProxy || undefined,
        onOutput: (bytes) => {
          log(new TextDecoder().decode(bytes));
        },
      });

      log('\n[Tests complete]\n');
    } catch (err) {
      if (err.message?.includes?.('unreachable')) {
        log('\n[Tests complete]\n');
      } else {
        log('\n[ERROR] ' + err.message + '\n');
      }
    }
  </script>
</body>
</html>
