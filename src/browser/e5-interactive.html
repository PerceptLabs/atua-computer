<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>atua-computer — interactive shell</title>
  <style>
    body { font-family: monospace; background: #1a1a2e; color: #e6e6e6; padding: 20px; }
    #output { white-space: pre-wrap; background: #16213e; padding: 15px; border-radius: 5px; min-height: 200px; max-height: 400px; overflow-y: auto; }
    .info { color: #a8d8ea; } .success { color: #4ecca3; } .error { color: #e84545; }
    #input { width: 100%; padding: 8px; margin-top: 10px; font-family: monospace; background: #0f3460; color: #e6e6e6; border: 1px solid #4ecca3; }
  </style>
</head>
<body>
  <h1>atua-computer — interactive Debian shell</h1>
  <div id="output"></div>
  <input id="input" placeholder="Type command and press Enter..." autofocus>

  <script type="module">
    import { AtuaComputer } from './atua-computer.js';

    const output = document.getElementById('output');
    const input = document.getElementById('input');

    function log(msg, cls = '') {
      const span = document.createElement('span');
      span.className = cls;
      span.textContent = msg;
      output.appendChild(span);
      output.scrollTop = output.scrollHeight;
    }

    const computer = new AtuaComputer();
    window._computer = computer; // expose for Playwright

    // Pre-load stdin with a command — bash reads it as a script
    computer.writeStdin('echo interactive-test\n');

    // Boot bash reading from stdin via -c with while read loop
    computer.boot({
      engineUrl: '/engine.wasm',
      rootfsUrl: '/debian-mini.tar',
      args: ['engine', '/bin/bash', '--norc', '--noprofile', '-c',
             'while IFS= read -r line; do echo "$line"; done'],
      env: { TERM: 'dumb', HOME: '/' },
      onOutput: (bytes) => {
        log(new TextDecoder().decode(bytes), 'success');
      },
    }).then(() => {
      log('\n[Shell exited]\n', 'info');
    }).catch(err => {
      log('\n[Error: ' + err.message + ']\n', 'error');
    });

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const cmd = input.value;
        input.value = '';
        log(cmd + '\n', 'info');
        computer.writeStdin(cmd + '\n');
      }
    });
  </script>
</body>
</html>
